<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YF 代買記帳系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --bg: #0f0e17; --surface: #1a1929; --accent: #ff6b35; --text: #fffffe; --text-dim: #a7a9be; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); }
.app-container { max-width: 500px; margin: 0 auto; padding-bottom: 80px; min-height: 100vh; }
header { padding: 15px 20px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2e2d45; }
.card { background: var(--surface); margin: 15px; padding: 20px; border-radius: 16px; border: 1px solid #2e2d45; }
.btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; }
#reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; min-height: 250px; }
#toast { position: fixed; top: -70px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 25px; border-radius: 30px; z-index: 9999; transition: 0.4s; }
#toast.show { top: 25px; }
.nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: rgba(26,25,41,0.95); display: flex; padding: 10px 0; border-top: 1px solid #2e2d45; backdrop-filter: blur(10px); }
.nav-item { flex: 1; text-align: center; color: var(--text-dim); font-size: 0.75rem; cursor: pointer; }
.nav-item.active { color: var(--accent); font-weight: bold; }
</style>
</head>
<body>

<div id="toast">提示訊息</div>

<div class="app-container">
  <header>
    <div style="font-weight: 900;">YF 代買記帳</div>
    <div id="conn-tag" style="font-size: 0.7rem; color: #ff4444;">● 尚未連線</div>
  </header>

  <div id="view-scan" class="view active">
    <div class="card">
      <h3 style="margin-top:0">📷 掃描成員</h3>
      <div id="reader"></div>
      <button class="btn" style="margin-top:10px; background:#2e2d45;" onclick="startScanner()">啟動相機 (後鏡頭)</button>
      <p id="camera-status" style="text-align:center; font-size:0.8rem; color:var(--text-dim); margin-top:10px;">請確保已使用 Safari/Chrome 並允許權限</p>
    </div>
  </div>

  <div id="view-order" class="view" style="display:none;">
    <div class="card">
      <h3>🛒 記帳中</h3>
      <div id="selected-user" style="padding:15px; background:#252438; border-radius:10px; color:var(--accent); text-align:center;">等待掃描...</div>
    </div>
  </div>
</div>

<nav class="nav-bar">
  <div class="nav-item active" onclick="location.reload()">📷<br>掃描</div>
  <div class="nav-item" onclick="alert('請先掃描成員')">🛒<br>記帳</div>
</nav>

<script>
// 已自動嵌入您的網址與 1111 密碼
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYDs_o14EHNr5Ep6Ws6xgovHn-11gOFQU1n0jIrfslH2bokszGItVbYbfAsaZ85cSVHw/exec"; 
const MY_TOKEN = "1111"; 
let html5QrCode;

window.onload = () => {
  testConnection();
};

async function testConnection() {
  const tag = document.getElementById('conn-tag');
  try {
    const res = await fetch(`${SCRIPT_URL}?action=members&token=${MY_TOKEN}`);
    const data = await res.json();
    if (data.status === "success") {
      tag.textContent = "● 雲端連線成功";
      tag.style.color = "#44ff44";
    } else {
      tag.textContent = "● 驗證失敗";
      alert("後端驗證失敗，請檢查指令碼屬性名稱是否為 ADMIN_TOKEN");
    }
  } catch (e) {
    tag.textContent = "● 連線異常";
  }
}

async function startScanner() {
  try {
    if (html5QrCode) await html5QrCode.stop().catch(()=>{});
    html5QrCode = new Html5QrCode("reader");
    await html5QrCode.start(
      { facingMode: "environment" }, 
      { fps: 10, qrbox: 250 },
      (text) => {
        showToast("✅ 已識別: " + text);
        document.getElementById('selected-user').textContent = "選取成員：" + text;
        // 切換頁面邏輯...
      }
    );
    document.getElementById("camera-status").textContent = "🟢 相機運作中";
  } catch (err) {
    alert("相機開啟失敗：請使用手機瀏覽器 (Safari/Chrome) 並點擊允許權限");
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
</body>
</html>
