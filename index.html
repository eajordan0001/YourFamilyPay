<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YF 代買記帳系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --bg: #0f0e17; --surface: #1a1929; --accent: #ff6b35; --text: #fffffe; --text-dim: #a7a9be; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); }
.app-container { max-width: 500px; margin: 0 auto; padding-bottom: 80px; min-height: 100vh; }
header { padding: 15px 20px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2e2d45; }
.card { background: var(--surface); margin: 15px; padding: 20px; border-radius: 16px; border: 1px solid #2e2d45; }
.btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; }
.btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; }
#reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; min-height: 250px; }
#toast { position: fixed; top: -70px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 25px; border-radius: 30px; z-index: 9999; transition: 0.4s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
#toast.show { top: 25px; }
.view { display: none; }
.view.active { display: block; }
#camera-btn { margin-top: 10px; background: #2e2d45; color: #fff; }
.nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: rgba(26,25,41,0.95); display: flex; padding: 10px 0; border-top: 1px solid #2e2d45; backdrop-filter: blur(10px); }
.nav-item { flex: 1; text-align: center; color: var(--text-dim); font-size: 0.75rem; cursor: pointer; }
.nav-item.active { color: var(--accent); font-weight: bold; }
</style>
</head>
<body>

<div id="toast">提示訊息</div>

<div class="app-container">
  <header>
    <div style="font-weight: 900; letter-spacing: 1px;">YF 代買記帳</div>
    <div id="connection-indicator" style="font-size: 0.7rem; color: #ff4444;">● 尚未連線</div>
  </header>

  <div id="view-scan" class="view active">
    <div class="card">
      <h3 style="margin-top:0">📷 掃描成員</h3>
      <div id="reader"></div>
      <button id="camera-btn" class="btn" onclick="startScanner()">點擊啟動/重啟相機</button>
      <p id="camera-status" style="text-align:center; font-size:0.8rem; color:var(--text-dim); margin-top:10px;">如果沒看到畫面，請按上方按鈕並允許權限</p>
    </div>
  </div>

  <div id="view-order" class="view">
    <div class="card">
      <h3>🛒 記帳模式</h3>
      <div id="selected-user" style="padding:15px; background:#252438; border-radius:10px; color:var(--accent); font-weight:bold; text-align:center;">請先掃描成員</div>
    </div>
  </div>
</div>

<nav class="nav-bar">
  <div id="nav-scan" class="nav-item active" onclick="switchView('scan')">📷<br>掃描</div>
  <div id="nav-order" class="nav-item" onclick="switchView('order')">🛒<br>記帳</div>
</nav>

<script>
// 已根據您的 Code.gs 嵌入網址與密碼
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYDs_o14EHNr5Ep6Ws6xgovHn-11gOFQU1n0jIrfslH2bokszGItVbYbfAsaZ85cSVHw/exec"; 
const MY_TOKEN = "1111"; 
let html5QrCode;

window.onload = () => {
  refreshData();
  // 嘗試自動啟動，若失敗則依賴按鈕
  setTimeout(startScanner, 1000);
};

// 掃描器：強制鎖定後鏡頭
async function startScanner() {
  try {
    if (html5QrCode && html5QrCode.isScanning) {
      await html5QrCode.stop();
    }
    
    document.getElementById("camera-status").textContent = "正在請求相機權限...";
    html5QrCode = new Html5QrCode("reader");
    
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
    
    // environment 代表後鏡頭
    await html5QrCode.start({ facingMode: "environment" }, config, (text) => {
      if (navigator.vibrate) navigator.vibrate(100);
      showToast("✅ 識別成功: " + text);
      document.getElementById('selected-user').textContent = "選取成員：" + text;
      switchView('order');
    });
    
    document.getElementById("camera-status").textContent = "🟢 相機運作中";
    document.getElementById("camera-btn").style.display = "none"; // 啟動後隱藏按鈕
  } catch (err) {
    document.getElementById("camera-status").textContent = "🔴 啟動失敗，請點擊按鈕重試";
    document.getElementById("camera-btn").style.display = "block";
    console.error(err);
  }
}

// 驗證 API 連線
async function refreshData() {
  const indicator = document.getElementById('connection-indicator');
  try {
    const res = await fetch(`${SCRIPT_URL}?action=members&token=${MY_TOKEN}`);
    const data = await res.json();
    if (data.status === "success") {
      indicator.textContent = "● 雲端已連線";
      indicator.style.color = "#44ff44";
    } else {
      indicator.textContent = "● 密碼驗證失敗";
    }
  } catch (e) {
    indicator.textContent = "● 連線異常";
  }
}

function switchView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + viewId).classList.add('active');
  document.getElementById('nav-' + viewId).classList.add('active');
  
  if (viewId === 'scan') startScanner();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
</body>
</html>
