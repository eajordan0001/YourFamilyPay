<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小天使代買系統</title>
  
  <meta name="theme-color" content="#e8006e">
  
  <link class="pwa-icon" rel="apple-touch-icon" sizes="192x192" href="icon192.png">
  <link class="pwa-icon" rel="apple-touch-icon" sizes="512x512" href="icon512.png">
  
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22%E5%B0%8F%E5%A4%A9%E4%BD%BF%E4%BB%A3%E8%B2%B7%E7%B3%BB%E7%B5%B1%22,%22short_name%22:%22%E5%B0%8F%E5%A4%A9%E4%BD%BF%E4%BB%A3%E8%B2%B7%E7%B3%BB%E7%B5%B1%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%23e8006e%22,%22icons%22:[{%22src%22:%22icon192.png%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22},{%22src%22:%22icon512.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

  <style>
    :root {
      --primary-color: #e8006e;
      --bg-color: #f7f9fa;
      --card-bg: #ffffff;
      --text-color: #2c3e50;
    }
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; font-size: 20px; }
    
    .container { max-width: 500px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    h2, h3 { color: var(--primary-color); text-align: center; margin-top: 0; font-size: 24px; }
    
    .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
    label { font-size: 20px; margin-bottom: 5px; font-weight: bold; }
    input { font-size: 20px; padding: 10px; border: 2px solid #ddd; border-radius: 6px; outline: none; background-color: #fff; }
    input:focus { border-color: var(--primary-color); }
    
    .btn { font-size: 20px; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: opacity 0.2s; text-align: center; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background-color: #7f8c8d; margin-top: 15px; }
    
    .view-section { display: none; }
    .view-section.active { display: block; }
    
    .role-selector { display: flex; gap: 10px; margin-bottom: 20px; }
    .role-btn { flex: 1; padding: 10px; border: 2px solid var(--primary-color); background: transparent; color: var(--primary-color); font-size: 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .role-btn.active { background: var(--primary-color); color: white; }
    
    .member-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
    .member-select-btn { font-size: 20px; padding: 15px 5px; background: #ffffff; border: 2px solid #e8006e; border-radius: 8px; color: #e8006e; font-weight: bold; cursor: pointer; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    .member-select-btn:active { background: #e8006e; color: white; }
    
    .mode-selector { display: flex; gap: 8px; margin: 10px 0 15px 0; }
    .mode-btn { flex: 1; padding: 8px; font-size: 18px; border: 1px solid #ccc; background: #fff; border-radius: 6px; cursor: pointer; }
    .mode-btn.active { background: #34495e; color: white; border-color: #34495e; font-weight: bold; }

    .info-box { background: #fff0f5; padding: 15px; border-radius: 8px; border-left: 5px solid var(--primary-color); margin-bottom: 15px; font-size: 20px; }
    .info-box div { margin: 5px 0; }
    
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 15px; }
    .grid-5 button { font-size: 18px; padding: 10px 0; background: #fff; border: 2px solid #f0a3c4; border-radius: 6px; cursor: pointer; color: var(--primary-color); font-weight: bold; }
    .grid-5 button:active { background: #f0a3c4; color: white; }
    
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
    .grid-3 button { font-size: 20px; padding: 12px 0; background: #f8f9fa; border: 2px solid #ddd; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .grid-3 button.selected { background: var(--primary-color); color: white; border-color: var(--primary-color); }
    
    .cart-box, .history-box { background: #f9f9f9; border: 1px dashed #ccc; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 18px; }
    .history-box { max-height: 250px; overflow-y: auto; overflow-x: hidden; border: 1px solid #ddd; background: #ffffff; }
    
    .cart-item, .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; width: 100%; }
    .cart-del-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px; font-weight: bold; padding: 2px 8px; }
    
    .hist-left { display: flex; flex-direction: column; text-align: left; max-width: 75%; }
    .hist-time { font-size: 13px; color: #7f8c8d; }
    .hist-item-name { font-size: 17px; color: #2c3e50; margin-top: 2px; }
    .hist-right-amt { font-size: 18px; font-weight: bold; text-align: right; width: 25%; }
    
    .calendar-container { background: #ffffff; border: 1px solid #ddd; border-radius: 8px; padding: 10px; margin-bottom: 15px; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .calendar-header button { background: none; border: 1px solid #ccc; padding: 5px 12px; font-size: 16px; border-radius: 4px; cursor: pointer; }
    .calendar-header button:active { background: #eee; }
    .calendar-title { font-size: 18px; font-weight: bold; color: var(--text-color); }
    
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 14px; }
    .cal-weekday { font-weight: bold; background: #f1f2f6; padding: 6px 0; border-bottom: 1px solid #ddd; color: #57606f; }
    .cal-cell { min-height: 48px; border-bottom: 1px solid #f1f2f6; border-right: 1px solid #f1f2f6; padding: 4px 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; position: relative; cursor: pointer; }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell.empty { cursor: default; background: #fafafa; }
    .cal-cell.selected { background: #fff2f7; border: 1px solid var(--primary-color); border-radius: 4px; }
    .cal-date-num { font-size: 14px; color: #2c3e50; }
    .cal-badge { display: inline-block; background-color: var(--primary-color); color: white; font-size: 11px; font-weight: bold; width: 18px; height: 18px; border-radius: 50%; text-align: center; line-height: 18px; margin-top: 3px; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; font-size: 20px; }
    .modal-title { text-align: center; font-weight: bold; color: #27ae60; font-size: 24px; margin-bottom: 20px; }
    
    .kv-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .kv-row { display: flex; width: 100%; align-items: center; }
    .kv-label { width: 100px; text-align: left; font-weight: bold; flex-shrink: 0; }
    .kv-colon { width: 20px; text-align: center; flex-shrink: 0; }
    .kv-value { flex-grow: 1; text-align: left; word-break: break-all; }
  </style>
</head>
<body>

<div class="container">
  <h2>小天使代買系統</h2>
  
  <div class="role-selector" id="roleSelector">
    <button class="role-btn active" onclick="switchRole('manager')">代買人登入</button>
    <button class="role-btn" onclick="switchRole('user')">一般成員查詢</button>
  </div>

  <div id="view-login" class="view-section active">
    <div class="form-group">
      <label for="login-id">帳號 (中文姓名 / ID)</label>
      <input type="text" id="login-id" placeholder="例如：ADMIN 或 曉萍">
    </div>
    <div class="form-group" id="pass-group">
      <label for="login-pass">密碼</label>
      <input type="password" id="login-pass">
    </div>
    <button class="btn" onclick="handleLogin()">進入系統</button>
  </div>

  <div id="view-main" class="view-section">
    <h3 id="panel-title">代買工作台</h3>
    
    <div id="manager-select-section">
      <label style="color: var(--primary-color);">請點選結帳成員：</label>
      <div class="member-grid" id="member-buttons-box"></div>
    </div>
    
    <hr id="panel-divider" style="border: 0; border-top: 1px solid #eee; margin: 15px 0; display:none;">
    
    <div id="target-user-info" style="display: none;">
      <div class="info-box">
        <div><strong>【ID】</strong> <span id="info-id">-</span></div>
        <div><strong>【餘額】</strong> <span id="info-balance">0</span> 元 <span id="info-warn-icon" style="color:red; font-weight:bold;"></span></div>
      </div>
      
      <div id="user-history-area" style="display: none;">
        <label>交易紀錄檢視模式</label>
        <div class="mode-selector">
          <button class="mode-btn active" id="btn-mode-list" onclick="changeHistoryMode('list')">📋 列表流水帳</button>
          <button class="mode-btn" id="btn-mode-cal" onclick="changeHistoryMode('cal')">📅 月曆對帳表</button>
        </div>

        <div id="history-list-wrapper">
          <div class="history-box" id="history-list">（無交易紀錄）</div>
        </div>

        <div id="history-cal-wrapper" style="display: none;">
          <div class="calendar-container">
            <div class="calendar-header">
              <button onclick="navigateMonth(-1)">◀ 上個月</button>
              <div class="calendar-title" id="cal-month-title">2026 年 06 月</div>
              <button onclick="navigateMonth(1)">下個月 ▶</button>
            </div>
            <div class="calendar-grid">
              <div class="cal-weekday">日</div><div class="cal-weekday">一</div><div class="cal-weekday">二</div>
              <div class="cal-weekday">三</div><div class="cal-weekday">四</div><div class="cal-weekday">五</div><div class="cal-weekday">六</div>
            </div>
            <div class="calendar-grid" id="calendar-days-box"></div>
          </div>
          <label id="cal-selected-date-label" style="font-size:16px; color:#57606f; margin-bottom:5px; display:block;">請點擊上方含數字的日期查看明細：</label>
          <div class="history-box" id="cal-day-details" style="max-height:150px;">（無選取日期）</div>
        </div>
      </div>
      
      <div id="manager-action-area">
        <div class="form-group" style="background: #f1f2f6; padding: 10px; border-radius: 6px; border: 1px solid #ddd;">
          <label for="tx-date-input" style="color:#2f3542; font-size:18px;">📅 交易日期 (預設當天，補帳可改)</label>
          <input type="date" id="tx-date-input" style="font-size:18px; padding:6px;">
        </div>

        <div class="form-group">
          <label>交易金額視窗</label>
          <input type="number" id="tx-amount" placeholder="0" style="text-align: right;">
        </div>
        
        <div class="grid-5">
          <button onclick="addAmount(-1)">-1</button>
          <button onclick="addAmount(-5)">-5</button>
          <button onclick="addAmount(-10)">-10</button>
          <button onclick="addAmount(-50)">-50</button>
          <button onclick="addAmount(-500)">-500</button>
          
          <button onclick="addAmount(1)">+1</button>
          <button onclick="addAmount(5)">+5</button>
          <button onclick="addAmount(10)">+10</button>
          <button onclick="addAmount(50)">+50</button>
          <button onclick="addAmount(500)">+500</button>
        </div>
        
        <label>交易項目 (單選)</label>
        <div class="grid-3" id="item-grid">
          <button class="item-opt selected" onclick="selectItem(this, '飲料')">飲料</button>
          <button class="item-opt" onclick="selectItem(this, '午餐')">午餐</button>
          <button class="item-opt" onclick="selectItem(this, '文具')">文具</button>
          <button class="item-opt" onclick="selectItem(this, '預留2')">預留2</button>
          <button class="item-opt" onclick="selectItem(this, '預留3')">預留3</button>
          <button class="item-opt" onclick="selectItem(this, '儲值金')">儲值金</button>
        </div>
        
        <div class="cart-box">
          <div style="font-weight: bold; margin-bottom: 5px;">購物車暫存：</div>
          <div id="cart-list">（無項目）</div>
        </div>
        
        <button class="btn" style="background-color: #27ae60; margin-bottom: 10px;" onclick="addToCart()">加入購物車</button>
        <button class="btn" id="btn-submit-tx" onclick="submitCartTransaction()">確認提交結帳</button>
        
        <button class="btn btn-secondary" style="background-color: #e67e22; margin-top:10px;" onclick="backToMemberList()">返回成員名單</button>
      </div>
    </div>
    
    <button class="btn btn-secondary" onclick="logout()">登出 / 切換帳號</button>
  </div>
</div>

<div class="modal" id="success-modal">
  <div class="modal-content">
    <div class="modal-title">交易成功</div>
    <div class="kv-container">
      <div class="kv-row"><div class="kv-label">成員</div><div class="kv-colon">:</div><div class="kv-value" id="res-name"></div></div>
      <div class="kv-row"><div class="kv-label">交易項目</div><div class="kv-colon">:</div><div class="kv-value" id="res-items"></div></div>
      <div class="kv-row"><div class="kv-label">原金額</div><div class="kv-colon">:</div><div class="kv-value" id="res-old"></div></div>
      <div class="kv-row"><div class="kv-label">變動金額</div><div class="kv-colon">:</div><div class="kv-value" id="res-change"></div></div>
      <div class="kv-row"><div class="kv-label">新餘額</div><div class="kv-colon">:</div><div class="kv-value" id="res-new"></div></div>
    </div>
    <button class="btn" onclick="closeModal()">關閉並繼續</button>
  </div>
</div>

<script>
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyWhTmqG_g03-4wJlLRT3qrkJt58dYlnO-WIvY6jOFfueRIedRkHQOC_cNg4VI6YuCwww/exec"; 

  let currentRole = 'manager'; 
  let loggedInUser = null;     
  let scannedUser = null;      
  let selectedItemName = '飲料';
  let shoppingCart = [];

  let currentDisplayYear = 2026;
  let currentDisplayMonth = 5; 
  let currentHistoryMode = 'list';

  function playBeep(type) {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime); 
      
      if (type === 'success') {
        oscillator.type = 'triangle';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
        oscillator.start();
        oscillator.frequency.setValueAtTime(1320, audioCtx.currentTime + 0.15); 
        oscillator.stop(audioCtx.currentTime + 0.35);
      }
    } catch (e) { console.log(e); }
  }

  function switchRole(role) {
    currentRole = role;
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    if (role === 'manager') {
      document.querySelector("button[onclick*='manager']").classList.add('active');
    } else {
      document.querySelector("button[onclick*='user']").classList.add('active');
    }
  }

  function handleLogin() {
    const id = document.getElementById('login-id').value.trim();
    const pass = document.getElementById('login-pass').value.trim();
    
    if(!id) { alert("請輸入帳號"); return; }
    if(!pass) { alert("請輸入密碼"); return; }
    
    const loginBtn = document.querySelector("#view-login .btn");
    loginBtn.disabled = true;
    loginBtn.innerText = "驗證中...";
    
    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "loginAndFetch",
        id: id,
        password: pass,
        isManager: (currentRole === 'manager'),
        byManagerScan: false
      })
    })
    .then(res => res.json())
    .then(data => {
      if(data.success) {
        loggedInUser = data;
        let today = new Date();
        currentDisplayYear = today.getFullYear();
        currentDisplayMonth = today.getMonth();
        showMainPanel();
      } else {
        alert("錯誤: " + data.message);
      }
    })
    .catch(err => {
      console.error(err);
      alert("網路連線失敗，請確認網路或 GAS 部署");
    })
    .finally(() => {
      loginBtn.disabled = false;
      loginBtn.innerText = "進入系統";
    });
  }

  function showMainPanel() {
    document.getElementById('view-login').classList.remove('active');
    document.getElementById('view-main').classList.add('active');
    document.getElementById('roleSelector').style.display = 'none';
    
    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('tx-date-input').value = todayStr;
    
    if (currentRole === 'user') {
      document.getElementById('panel-title').innerText = "歡迎！" + loggedInUser.name;
      document.getElementById('manager-select-section').style.display = 'none'; 
      document.getElementById('panel-divider').style.display = 'none';
      document.getElementById('manager-action-area').style.display = 'none'; 
      document.getElementById('user-history-area').style.display = 'block'; 
      
      scannedUser = loggedInUser;
      showTargetUserInfo();
    } else {
      document.getElementById('panel-title').innerText = "小天使代買工作台";
      document.getElementById('manager-select-section').style.display = 'block';
      document.getElementById('panel-divider').style.display = 'none';
      document.getElementById('manager-action-area').style.display = 'block'; 
      document.getElementById('user-history-area').style.display = 'none'; 
      document.getElementById('target-user-info').style.display = 'none';
      
      renderMemberButtons(loggedInUser.members);
    }
  }

  function renderMemberButtons(membersArray) {
    const box = document.getElementById('member-buttons-box');
    box.innerHTML = "";
    
    if(!membersArray || membersArray.length === 0) {
      box.innerHTML = "<div style='grid-column:span 3; text-align:center; color:#7f8c8d;'>成員名單內無任何資料</div>";
      return;
    }
    
    membersArray.forEach(m => {
      let btn = document.createElement('button');
      btn.className = "member-select-btn";
      btn.innerText = m.name;
      btn.onclick = function() {
        selectTargetMember(m);
      };
      box.appendChild(btn);
    });
  }

  function selectTargetMember(memberObj) {
    scannedUser = memberObj;
    shoppingCart = []; 
    updateCartUI();
    
    document.getElementById('manager-select-section').style.display = 'none';
    document.getElementById('panel-divider').style.display = 'block';
    showTargetUserInfo();
  }

  function backToMemberList() {
    document.getElementById('target-user-info').style.display = 'none';
    document.getElementById('panel-divider').style.display = 'none';
    document.getElementById('manager-select-section').style.display = 'block';
    scannedUser = null;
  }

  function showTargetUserInfo() {
    document.getElementById('target-user-info').style.display = 'block';
    document.getElementById('info-id').innerText = scannedUser.name; 
    document.getElementById('info-balance').innerText = scannedUser.balance;
    
    // 【核心邏輯更新】高低於門檻 100 元時顯示 ⚠️ 警告標籤
    const warnIconSpan = document.getElementById('info-warn-icon');
    if (Number(scannedUser.balance) <= 100) {
      warnIconSpan.innerText = "⚠️";
    } else {
      warnIconSpan.innerText = "";
    }
    
    document.getElementById('tx-amount').value = ""; 
    
    if (currentRole === 'user') {
      renderHistoryUI(scannedUser.history);
      renderCalendarUI(); 
    }
  }

  function changeHistoryMode(mode) {
    currentHistoryMode = mode;
    document.getElementById('btn-mode-list').classList.remove('active');
    document.getElementById('btn-mode-cal').classList.remove('active');
    document.getElementById('history-list-wrapper').style.display = 'none';
    document.getElementById('history-cal-wrapper').style.display = 'none';

    if(mode === 'list') {
      document.getElementById('btn-mode-list').classList.add('active');
      document.getElementById('history-list-wrapper').style.display = 'block';
    } else {
      document.getElementById('btn-mode-cal').classList.add('active');
      document.getElementById('history-cal-wrapper').style.display = 'block';
      renderCalendarUI();
    }
  }

  function renderHistoryUI(historyArray) {
    const histDiv = document.getElementById('history-list');
    if (!historyArray || historyArray.length === 0) {
      histDiv.innerHTML = "<div style='text-align:center; padding:15px; color:#7f8c8d;'>（半年內無交易紀錄）</div>";
      return;
    }
    
    let html = "";
    historyArray.forEach(log => {
      let color = log.change >= 0 ? "#27ae60" : "#e74c3c";
      let prefix = log.change >= 0 ? "+" : "";
      
      html += `<div class="history-item">
                <div class="hist-left">
                  <span class="hist-time">${log.date}</span>
                  <span class="hist-item-name">(${log.item})</span>
                </div>
                <div class="hist-right-amt" style="color: ${color};">
                  ${prefix}${log.change} 元
                </div>
              </div>`;
    });
    histDiv.innerHTML = html;
  }

  function navigateMonth(direction) {
    currentDisplayMonth += direction;
    if (currentDisplayMonth > 11) {
      currentDisplayMonth = 0;
      currentDisplayYear++;
    } else if (currentDisplayMonth < 0) {
      currentDisplayMonth = 11;
      currentDisplayYear--;
    }
    renderCalendarUI();
  }

  function renderCalendarUI() {
    const displayMonthStr = String(currentDisplayMonth + 1).padStart(2, '0');
    document.getElementById('cal-month-title').innerText = `${currentDisplayYear} 年 ${displayMonthStr} 月`;
    
    const daysBox = document.getElementById('calendar-days-box');
    daysBox.innerHTML = ""; 
    
    document.getElementById('cal-selected-date-label').innerText = "請點擊上方含數字的日期查看明細：";
    document.getElementById('cal-day-details').innerHTML = "（無選取日期）";

    let txDictionary = {};
    if (scannedUser && scannedUser.history) {
      scannedUser.history.forEach(log => {
        let datePart = log.date.split(" ")[0]; 
        if (!txDictionary[datePart]) {
          txDictionary[datePart] = [];
        }
        txDictionary[datePart].push(log);
      });
    }

    let firstDayOfWeek = new Date(currentDisplayYear, currentDisplayMonth, 1).getDay(); 
    let totalDaysInMonth = new Date(currentDisplayYear, currentDisplayMonth + 1, 0).getDate(); 

    for (let i = 0; i < firstDayOfWeek; i++) {
      let emptyCell = document.createElement('div');
      emptyCell.className = "cal-cell empty";
      daysBox.appendChild(emptyCell);
    }

    for (let day = 1; day <= totalDaysInMonth; day++) {
      let currentDayStr = String(day).padStart(2, '0');
      let fullKeyPath = `${currentDisplayYear}/${displayMonthStr}/${currentDayStr}`;
      
      let cell = document.createElement('div');
      cell.className = "cal-cell";
      
      let dateNumSpan = document.createElement('span');
      dateNumSpan.className = "cal-date-num";
      dateNumSpan.innerText = day;
      cell.appendChild(dateNumSpan);
      
      if (txDictionary[fullKeyPath] && txDictionary[fullKeyPath].length > 0) {
        let count = txDictionary[fullKeyPath].length;
        let badge = document.createElement('span');
        badge.className = "cal-badge";
        badge.innerText = count;
        cell.appendChild(badge);
        
        cell.onclick = function() {
          document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
          cell.classList.add('selected');
          showDayDetailsUI(fullKeyPath, txDictionary[fullKeyPath]);
        };
      } else {
        cell.onclick = function() {
          document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
          cell.classList.add('selected');
          document.getElementById('cal-selected-date-label').innerText = `${fullKeyPath} 的交易明細：`;
          document.getElementById('cal-day-details').innerHTML = "<div style='text-align:center; padding:15px; color:#7f8c8d;'>當日無任何交易紀錄</div>";
        };
      }
      daysBox.appendChild(cell);
    }
  }

  function showDayDetailsUI(dateLabel, dayLogs) {
    document.getElementById('cal-selected-date-label').innerText = `${dateLabel} 的交易明細 (${dayLogs.length}筆)：`;
    const detailsDiv = document.getElementById('cal-day-details');
    let html = "";
    
    dayLogs.forEach(log => {
      let color = log.change >= 0 ? "#27ae60" : "#e74c3c";
      let prefix = log.change >= 0 ? "+" : "";
      let timePart = log.date.split(" ")[1]; 
      
      html += `<div class="history-item">
                <div class="hist-left">
                  <span class="hist-time">時間: ${timePart}</span>
                  <span class="hist-item-name">項目: ${log.item}</span>
                </div>
                <div class="hist-right-amt" style="color: ${color}; font-size:16px;">
                  ${prefix}${log.change} 元
                </div>
              </div>`;
    });
    detailsDiv.innerHTML = html;
  }

  function addAmount(val) {
    let input = document.getElementById('tx-amount');
    let currentVal = input.value === "" ? 0 : Number(input.value);
    input.value = currentVal + val;
  }

  function selectItem(element, name) {
    document.querySelectorAll('.item-opt').forEach(b => b.classList.remove('selected'));
    element.classList.add('selected');
    selectedItemName = name;
  }

  function addToCart() {
    let input = document.getElementById('tx-amount');
    let amt = input.value === "" ? 0 : Number(input.value);
    if(amt === 0) { alert("金額不能為0"); return; }
    
    shoppingCart.push({ name: selectedItemName, amount: amt });
    updateCartUI();
    input.value = ""; 
  }

  function removeFromCart(index) {
    shoppingCart.splice(index, 1);
    updateCartUI();
  }

  function updateCartUI() {
    const listDiv = document.getElementById('cart-list');
    if (shoppingCart.length === 0) {
      listDiv.innerHTML = "（無項目）";
      return;
    }
    let html = "";
    shoppingCart.forEach((item, index) => {
      html += `<div class="cart-item">
                <span>${item.name}：${item.amount > 0 ? '+' : ''}${item.amount} 元</span>
                <button class="cart-del-btn" onclick="removeFromCart(${index})">[刪除]</button>
              </div>`;
    });
    listDiv.innerHTML = html;
  }

  function submitCartTransaction() {
    if(shoppingCart.length === 0) { alert("購物車目前沒有項目，請先加入項目。"); return; }
    
    const customDateValue = document.getElementById('tx-date-input').value;
    
    document.getElementById('btn-submit-tx').disabled = true;
    document.getElementById('btn-submit-tx').innerText = "交易處理中...";

    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "submitTransaction",
        managerId: loggedInUser.id,
        userId: scannedUser.id,
        cartItems: shoppingCart,
        customDate: customDateValue
      })
    })
    .then(res => res.json())
    .then(data => {
      if(data.success) {
        playBeep('success');
        showSuccessModal(data);
      } else {
        alert("交易失敗: " + data.message);
      }
    })
    .finally(() => {
      document.getElementById('btn-submit-tx').disabled = false;
      document.getElementById('btn-submit-tx').innerText = "確認提交結帳";
    });
  }

  function showSuccessModal(data) {
    document.getElementById('res-name').innerText = data.name;
    document.getElementById('res-items').innerText = data.itemsText;
    document.getElementById('res-old').innerText = data.startBalance + " 元";
    document.getElementById('res-change').innerText = (data.totalChange > 0 ? "+" : "") + data.totalChange + " 元";
    document.getElementById('res-new').innerText = data.endBalance + " 元";
    
    document.getElementById('success-modal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('success-modal').classList.remove('active');
    shoppingCart = [];
    updateCartUI();
    
    if (currentRole === 'manager') {
      backToMemberList();
    } else {
      document.getElementById('info-balance').innerText = Number(document.getElementById('res-new').innerText.replace(" 元",""));
      document.getElementById('tx-amount').value = ""; 
    }
  }

  function logout() {
    loggedInUser = null;
    scannedUser = null;
    shoppingCart = [];
    currentHistoryMode = 'list';
    document.getElementById('view-main').classList.remove('active');
    document.getElementById('view-login').classList.add('active');
    document.getElementById('roleSelector').style.display = 'flex';
    document.getElementById('login-id').value = "";
    document.getElementById('login-pass').value = "";
    document.getElementById('btn-mode-list').classList.add('active');
    document.getElementById('btn-mode-cal').classList.remove('active');
    document.getElementById('history-list-wrapper').style.display = 'block';
    document.getElementById('history-cal-wrapper').style.display = 'none';
  }
</script>
</body>
</html>
