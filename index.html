<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YF 代買記帳系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --bg: #0f0e17; --surface: #1a1929; --accent: #ff6b35; --text: #fffffe; --text-dim: #a7a9be; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app-container { max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
header { padding: 15px 20px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2e2d45; }
.card { background: var(--surface); margin: 15px; padding: 20px; border-radius: 16px; border: 1px solid #2e2d45; }
.btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; transition: 0.2s; }
.btn:active { transform: scale(0.98); opacity: 0.9; }
.btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; }
#reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 10px; min-height: 250px; }
#toast { position: fixed; top: -70px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 25px; border-radius: 30px; z-index: 9999; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
#toast.show { top: 25px; }
#login-modal { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 5000; }
.modal-content { background: var(--surface); padding: 30px; border-radius: 24px; width: 85%; max-width: 320px; text-align: center; border: 1px solid #2e2d45; }
input[type="password"] { width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px; border: 1px solid #2e2d45; background: #050505; color: white; font-size: 1.5rem; text-align: center; letter-spacing: 5px; }
.view { display: none; }
.view.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: rgba(26,25,41,0.95); display: flex; padding: 12px 0; border-top: 1px solid #2e2d45; backdrop-filter: blur(10px); }
.nav-item { flex: 1; text-align: center; color: var(--text-dim); font-size: 0.75rem; cursor: pointer; }
.nav-item.active { color: var(--accent); font-weight: bold; }
</style>
</head>
<body>

<div id="toast">提示訊息</div>

<div id="login-modal">
  <div class="modal-content">
    <div style="font-size: 3.5rem; margin-bottom: 15px;">🛡️</div>
    <h2 style="margin:0">身分驗證</h2>
    <p style="color: var(--text-dim); margin-top: 10px;">請輸入 ADMIN 或 VIEW 通行碼</p>
    <input type="password" id="token-input" placeholder="••••" autofocus>
    <button class="btn" onclick="handleLogin()">進入系統</button>
  </div>
</div>

<div class="app-container">
  <header>
    <div style="font-weight: 900; letter-spacing: 1px; font-size: 1.2rem;">YF 代買記帳</div>
    <button class="btn-outline" onclick="logout()">切換帳號</button>
  </header>

  <div id="view-scan" class="view">
    <div class="card">
      <h3 style="margin-top:0; display:flex; align-items:center; gap:8px;">
        <span>📷</span> 快速掃描成員
      </h3>
      <div id="reader"></div>
      <p id="camera-status" style="text-align:center; font-size:0.85rem; color:var(--text-dim); margin: 5px 0;">等待相機權限...</p>
    </div>
    <div class="card">
      <h3 style="margin-top:0">雲端同步狀態</h3>
      <div id="sync-status" style="padding:10px; border-radius:8px; background:#252438; font-size:0.9rem; border-left:4px solid var(--accent);">
        讀取中...
      </div>
      <button class="btn" style="margin-top:15px; padding:10px; font-size:0.8rem;" onclick="refreshData()">手動同步資料</button>
    </div>
  </div>

  <div id="view-order" class="view">
    <div class="card">
      <h3>🛒 新增代買紀錄</h3>
      <div id="selected-user" style="padding:20px; background:#252438; border-radius:12px; color:var(--accent); font-weight:bold; text-align:center; font-size:1.2rem; border: 1px dashed var(--accent);">
        請先至掃描頁辨識成員
      </div>
      <p style="text-align:center; color:var(--text-dim); font-size:0.8rem; margin-top:10px;">辨識成功後將在此自動顯示成員名稱</p>
    </div>
  </div>
</div>

<nav class="nav-bar">
  <div id="nav-scan" class="nav-item" onclick="switchView('scan')">📷<br>掃描</div>
  <div id="nav-order" class="nav-item" onclick="switchView('order')">🛒<br>記帳</div>
</nav>

<script>
// 已嵌入您的 GAS 部署網址
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYDs_o14EHNr5Ep6Ws6xgovHn-11gOFQU1n0jIrfslH2bokszGItVbYbfAsaZ85cSVHw/exec"; 
let currentToken = localStorage.getItem("yf_token");
let html5QrCode;

// 頁面載入邏輯
window.onload = () => {
  if (currentToken) {
    document.getElementById('login-modal').style.display = 'none';
    initApp();
  } else {
    document.getElementById('login-modal').style.display = 'flex';
  }
};

// 登入處理
async function handleLogin() {
  const val = document.getElementById('token-input').value;
  if (!val) {
    showToast("⚠️ 請輸入通行碼");
    return;
  }
  
  currentToken = val;
  localStorage.setItem("yf_token", val);
  document.getElementById('login-modal').style.display = 'none';
  
  // 驗證後直接初始化
  initApp();
}

function initApp() {
  switchView('scan'); // 預設跳到掃描頁
  refreshData();
}

// 核心掃描功能 (強制後鏡頭)
async function startScanner() {
  try {
    const readerElement = document.getElementById("reader");
    if (!readerElement) return;

    if (html5QrCode && html5QrCode.isScanning) {
      await html5QrCode.stop();
    }
    
    html5QrCode = new Html5QrCode("reader");
    const config = { fps: 15, qrbox: { width: 250, height: 250 } };
    
    // facingMode: "environment" 確保調用後置相機
    await html5QrCode.start({ facingMode: "environment" }, config, (text) => {
      // 成功掃描
      if (navigator.vibrate) navigator.vibrate(100);
      showToast("✅ 識別成功: " + text);
      document.getElementById('selected-user').textContent = "👤 選取成員：" + text;
      
      // 自動跳轉到記帳頁
      setTimeout(() => switchView('order'), 500);
    });
    
    document.getElementById("camera-status").textContent = "🟢 相機運作中 (後鏡頭)";
  } catch (err) {
    document.getElementById("camera-status").textContent = "🔴 相機啟動失敗 (請確認權限)";
    console.error("相機錯誤:", err);
  }
}

// 同步資料
async function refreshData() {
  const statusEl = document.getElementById('sync-status');
  statusEl.textContent = "⏳ 正在同步雲端資料...";
  
  try {
    const response = await fetch(`${SCRIPT_URL}?action=members&token=${currentToken}`);
    const data = await response.json();
    
    if (data.status === "success") {
      statusEl.innerHTML = `✅ 連線成功<br><small style="color:var(--text-dim)">更新時間：${new Date().toLocaleTimeString()}</small>`;
      showToast("☁️ 資料同步完成");
    } else {
      statusEl.textContent = "❌ 驗證失敗：通行碼錯誤";
      showToast("通行碼不正確");
      logout(); // 驗證失敗自動導向登入
    }
  } catch (err) {
    statusEl.textContent = "❌ 連線失敗：無法連接 GAS 伺服器";
    showToast("網路連線異常");
  }
}

// 切換頁面視圖
function switchView(viewId) {
  // 隱藏所有頁面
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  
  // 顯示目標頁面
  document.getElementById('view-' + viewId).classList.add('active');
  document.getElementById('nav-' + viewId).classList.add('active');

  // 如果切換到掃描頁，啟動相機
  if (viewId === 'scan') {
    startScanner();
  } else {
    // 離開掃描頁時停止相機以省電
    if (html5QrCode && html5QrCode.isScanning) {
      html5QrCode.stop().catch(() => {});
    }
  }
}

function logout() {
  localStorage.removeItem("yf_token");
  location.reload();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
</body>
</html>
