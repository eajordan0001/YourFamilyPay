<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YF 代買記帳系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
:root { --bg: #0f0e17; --surface: #1a1929; --accent: #ff6b35; --text: #fffffe; --text-dim: #a7a9be; }
body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); }
.app-container { max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
header { padding: 15px; background: var(--surface); display: flex; justify-content: space-between; border-bottom: 1px solid #2e2d45; }
.card { background: var(--surface); margin: 15px; padding: 20px; border-radius: 16px; border: 1px solid #2e2d45; }
.btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
#reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; min-height: 250px; }
.nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: rgba(26,25,41,0.95); display: flex; padding: 10px 0; border-top: 1px solid #2e2d45; }
.nav-item { flex: 1; text-align: center; color: var(--text-dim); font-size: 0.75rem; }
.active { color: var(--accent); font-weight: bold; }
</style>
</head>
<body>
<div class="app-container">
  <header>
    <div style="font-weight: 900;">YF 代買記帳</div>
    <div id="conn-tag" style="font-size: 0.7rem; color: #ff4444;">● 尚未連線</div>
  </header>
  <div class="card">
    <h3 style="margin-top:0">📷 掃描成員</h3>
    <div id="reader"></div>
    <button class="btn" style="margin-top:10px;" onclick="startScanner()">啟動相機</button>
    <p id="status" style="text-align:center; font-size:0.8rem; margin-top:10px; color:var(--text-dim);">連線狀態：等待測試...</p>
  </div>
</div>
<nav class="nav-bar">
  <div class="nav-item active">📷<br>掃描</div>
  <div class="nav-item" onclick="alert('請先掃描')">🛒<br>記帳</div>
</nav>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYDs_o14EHNr5Ep6Ws6xgovHn-11gOFQU1n0jIrfslH2bokszGItVbYbfAsaZ85cSVHw/exec"; 
const MY_TOKEN = "1111"; 
let html5QrCode;

window.onload = testConn;

async function testConn() {
  const tag = document.getElementById('conn-tag');
  const status = document.getElementById('status');
  try {
    const res = await fetch(`${SCRIPT_URL}?action=members&token=${MY_TOKEN}`);
    const data = await res.json();
    if (data.status === "success") {
      tag.textContent = "● 雲端連線成功";
      tag.style.color = "#44ff44";
      status.textContent = "連線狀態：✅ 正常";
    } else {
      tag.textContent = "● 驗證失敗";
      status.textContent = "❌ 驗證失敗：" + JSON.stringify(data);
    }
  } catch (e) {
    status.textContent = "❌ 連線異常，請檢查網路";
  }
}

async function startScanner() {
  try {
    if (html5QrCode) await html5QrCode.stop().catch(()=>{});
    html5QrCode = new Html5QrCode("reader");
    await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
      alert("掃描成功：" + text);
    });
  } catch (err) {
    alert("相機開啟失敗，請確保使用 Safari/Chrome 並點選允許");
  }
}
</script>
</body>
</html>
