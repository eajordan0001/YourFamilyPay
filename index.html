<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小天使代買系統 v6.3</title>
    
    <link rel="manifest" href="manifest.json">
    
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    
    <link rel="apple-touch-icon" id="ios-icon-512" href="icon-512.png">
    <link rel="apple-touch-icon" sizes="192x192" id="ios-icon-192" href="icon-192.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="小天使代買系統">

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const fixIcon = (id, filename) => {
                const el = document.getElementById(id);
                if (el) el.href = new URL(filename, window.location.href).href;
            };
            fixIcon("ios-icon-512", "icon-512.png");
            fixIcon("ios-icon-192", "icon-192.png");
        });
    </script>

    <style>
        :root { --primary-blue: #2196F3; --bg-blue: #e3f2fd; --dark-gray: #333; --disabled-gray: #999; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; text-align: center; margin: 0; padding: 15px; background-color: var(--primary-blue); }
        .main-card { background: var(--bg-blue); padding: 20px; border-radius: 30px; max-width: 400px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); min-height: 85vh; }
        
        #reader { width: 100%; border-radius: 20px; overflow: hidden; background: #000; margin-bottom: 15px; min-height: 250px; }
        
        .info-box { background: rgba(255,255,255,0.7); padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #bbdefb; }
        .user-name { font-size: 38px; font-weight: 900; color: var(--primary-blue); margin: 0; }
        .user-debt { font-size: 32px; font-weight: bold; color: #f44336; margin: 5px 0; }
        
        .input-group { margin-bottom: 20px; }
        .amount-input { 
            width: 85%; border: 3px solid var(--dark-gray); border-radius: 15px; 
            font-size: 42px; font-weight: bold; padding: 10px; text-align: center;
            outline: none; background: white; color: #000;
        }
        
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-quick { background: white; border: none; border-radius: 12px; padding: 12px 0; font-size: 18px; font-weight: bold; box-shadow: 0 3px 0 #ccc; }
        .btn-quick:active { transform: translateY(2px); box-shadow: none; }
        
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-item { background: #fff; border: 2px solid #ddd; border-radius: 12px; padding: 12px; font-size: 16px; font-weight: bold; color: #444; }
        .btn-item.active { background: var(--dark-gray); color: white; border-color: var(--dark-gray); }
        
        .action-btn { display: block; width: 100%; padding: 18px 0; font-size: 20px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; margin-bottom: 10px; }
        .action-btn:disabled { background: var(--disabled-gray) !important; color: #ddd !important; cursor: not-allowed; box-shadow: none !important; }
        
        #start-btn { background: #4CAF50; color: white; }
        #ok-btn { background: var(--primary-blue); color: white; box-shadow: 0 5px 0 #1565c0; }
        #reset-btn { background: #666; color: white; }

        /* 20px 四字靠左、冒號完美對齊樣式 */
        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 92%; max-width: 400px; font-size: 20px; color: #333; box-sizing: border-box; }
        .modal-header { text-align: center; font-weight: bold; color: #2196F3; margin-bottom: 15px; font-size: 26px; }
        .modal-body { text-align: left; border-top: 1px dashed #ccc; border-bottom: 1px dashed #ccc; padding: 20px 0; margin-bottom: 20px; font-family: monospace; }
        
        .modal-line { margin-bottom: 10px; display: flex; font-size: 18px; }
        .modal-label { display: inline-block; width: 110px; text-align: left; font-weight: bold; }
        .modal-colon { width: 20px; display: inline-block; text-align: center; }
        .modal-value { flex: 1; font-weight: bold; color: #2196F3; }
    </style>
</head>

<body>
<div class="main-card">
    <h2 style="color:#0d47a1;">👼 小天使代買系統</h2>
    <button id="start-btn" class="action-btn" onclick="initAndStart()">📸 掃描同事 QR Code</button>
    <div id="reader" style="display:none;"></div>

    <div id="trade-ui" style="display:none;">
        <div class="info-box">
            <div id="display-name" class="user-name">---</div>
            <div style="font-size:14px; color:#666; margin-top:5px;">累積欠款 (未給主揪)</div>
            <div id="display-balance" class="user-debt">$0</div>
        </div>
        
        <div class="input-group">
            <div style="font-size:14px; color:#555; margin-bottom:5px; font-weight:bold;">異動金額 (可手動修改)</div>
            <input type="number" id="amount-input" class="amount-input" value="0" oninput="manualInput(this.value)">
        </div>
        
        <div class="grid-4">
            <button class="btn-quick" onclick="modAmt(10)">+10</button>
            <button class="btn-quick" onclick="modAmt(50)">+50</button>
            <button class="btn-quick" onclick="modAmt(100)">+100</button>
            <button class="btn-quick" style="color:red" onclick="modAmt(-50)">-50</button>
        </div>

        <div class="grid-2">
            <div style="grid-column: span 2; font-size: 16px; font-weight: bold; color: #555; margin-bottom: 5px; text-align: left;">選擇代買項目：</div>
            <button class="btn-item active" onclick="setNote(this, '午餐代買')">午餐代買</button>
            <button class="btn-item" onclick="setNote(this, '下午茶')">下午茶</button>
            <button class="btn-item" onclick="setNote(this, '星巴克')">星巴克</button>
            <button class="btn-item" onclick="setNote(this, '零食團')">零食團</button>
        </div>

        <button id="ok-btn" class="action-btn" onclick="doTrade()">確認交易送出</button>
        <button id="reset-btn" class="action-btn" onclick="resetToScan()">取消 / 重新掃描</button>
    </div>
</div>

<div id="custom-modal">
    <div class="modal-content">
        <div class="modal-header">📝 記帳成功</div>
        <div id="modal-body-content" class="modal-body"></div>
        <button style="width:100%; padding:15px; background:var(--primary-blue); color:white; border:none; border-radius:10px; font-size:20px; font-weight:bold;" onclick="closeModal()">確定</button>
    </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzI8YIKfK2h5MVeUOWE1oJq4mHu4KguUOVS_gt0wZdHvSz1AaDaOaE8jCD0rmz9q9SV/exec"; 
const TOKEN = "office99"; 
const BEEP_FREQ = 1200; 

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playBeep() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(BEEP_FREQ, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime); 
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

let scanner = null, globalId = "", currentAmt = 0, currentNote = "午餐代買", oldBalance = 0;

function initAndStart() {
    document.getElementById("start-btn").style.display = "none";
    document.getElementById("reader").style.display = "block";
    startScan();
}

async function startScan() {
    if (!scanner) scanner = new Html5Qrcode("reader");
    try {
        await scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            playBeep(); globalId = text.trim(); scanner.stop().then(() => fetchData());
        });
    } catch (e) { console.error(e); }
}

async function fetchData() {
    document.getElementById("reader").style.display = "none";
    document.getElementById("trade-ui").style.display = "block";
    document.getElementById("display-name").innerText = "連線中...";
    try {
        const res = await fetch(`${scriptURL}?id=${globalId}&token=${TOKEN}&type=get`);
        const data = await res.json();
        if (data.status === "success") {
            oldBalance = data.balance;
            document.getElementById("display-name").innerText = data.name;
            document.getElementById("display-balance").innerText = "$" + data.balance;
        } else { alert("查無此人"); resetToScan(); }
    } catch (e) { alert("讀取資料失敗"); resetToScan(); }
}

function modAmt(v) { currentAmt += v; document.getElementById("amount-input").value = currentAmt; }
function manualInput(v) { currentAmt = parseInt(v) || 0; }
function setNote(btn, note) { 
    document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('active')); 
    btn.classList.add('active'); currentNote = note; 
}

async function doTrade() {
    if (currentAmt === 0) return alert("請輸入有效金額");
    const btnOk = document.getElementById("ok-btn");
    const btnReset = document.getElementById("reset-btn");
    
    btnOk.disabled = true; 
    btnOk.innerText = "⏳ 交易進行中";
    btnReset.disabled = true;

    try {
        const res = await fetch(`${scriptURL}?id=${globalId}&amount=${currentAmt}&note=${encodeURIComponent(currentNote)}&token=${TOKEN}&type=post`);
        const data = await res.json();
        
        if (data.status === "success") {
            const createLine = (label, value) => {
                return `<div class="modal-line">
                    <span class="modal-label">${label}</span>
                    <span class="modal-colon">:</span>
                    <span class="modal-value">${value}</span>
                </div>`;
            };

            let infoHTML = 
                createLine("【  ID】", globalId) +
                createLine("【姓名】", data.name) +
                createLine("【交易項目】", currentNote) +
                createLine("【原金額】", "$" + oldBalance) +
                createLine("【變動金額】", (currentAmt > 0 ? "+$" : "-$") + Math.abs(currentAmt)) +
                createLine("【新餘額】", "$" + data.newBalance);
                
            document.getElementById("modal-body-content").innerHTML = infoHTML;
            document.getElementById("custom-modal").style.display = "flex";
        } else {
            alert("記帳失敗：" + data.message);
            btnOk.disabled = false; btnOk.innerText = "確認交易送出";
            btnReset.disabled = false;
        }
    } catch(e) { 
        alert("網路異常，請檢查試算表端"); 
        btnOk.disabled = false; btnOk.innerText = "確認交易送出";
        btnReset.disabled = false;
    }
}

function closeModal() { document.getElementById("custom-modal").style.display = "none"; resetToScan(); }
function resetToScan() {
    globalId = ""; currentAmt = 0; currentNote = "午餐代買";
    document.getElementById("amount-input").value = "0";
    document.getElementById("trade-ui").style.display = "none";
    document.getElementById("reader").style.display = "block";
    
    const btnOk = document.getElementById("ok-btn");
    const btnReset = document.getElementById("reset-btn");
    btnOk.disabled = false; btnOk.innerText = "確認交易送出";
    btnReset.disabled = false;
    
    document.querySelectorAll('.btn-item').forEach((b, i) => b.classList.toggle('active', i === 0));
    startScan();
}
</script>
</body>
</html>
