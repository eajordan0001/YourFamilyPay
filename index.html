<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小天使代買系統</title>
  
  <meta name="theme-color" content="#e8006e">
  
  <link class="pwa-icon" rel="apple-touch-icon" sizes="192x192" href="icon192.png">
  <link class="pwa-icon" rel="apple-touch-icon" sizes="512x512" href="icon512.png">
  
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22代買系統%22,%22short_name%22:%22代買%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%23e8006e%22,%22icons%22:[{%22src%22:%22icon192.png%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22},{%22src%22:%22icon512.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">
  
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    /* 全域樣式：亮色系與 20px 字體 */
    :root {
      --primary-color: #e8006e;
      --bg-color: #f7f9fa;
      --card-bg: #ffffff;
      --text-color: #2c3e50;
    }
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; font-size: 20px; }
    
    .container { max-width: 500px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    h2, h3 { color: var(--primary-color); text-align: center; margin-top: 0; font-size: 24px; }
    
    /* 表單單元 */
    .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
    label { font-size: 20px; margin-bottom: 5px; font-weight: bold; }
    input { font-size: 20px; padding: 10px; border: 2px solid #ddd; border-radius: 6px; outline: none; }
    input:focus { border-color: var(--primary-color); }
    
    /* 按鈕樣式 */
    .btn { font-size: 20px; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: opacity 0.2s; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background-color: #7f8c8d; margin-top: 10px; }
    
    /* 切換區塊 */
    .view-section { display: none; }
    .view-section.active { display: block; }
    
    /* 身分選擇器 */
    .role-selector { display: flex; gap: 10px; margin-bottom: 20px; }
    .role-btn { flex: 1; padding: 10px; border: 2px solid var(--primary-color); background: transparent; color: var(--primary-color); font-size: 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .role-btn.active { background: var(--primary-color); color: white; }
    
    /* 掃描器外框 */
    #reader { width: 100%; background: #000; border-radius: 8px; overflow: hidden; min-height: 250px; }
    
    /* 使用者資訊顯示區 */
    .info-box { background: #fff0f5; padding: 15px; border-radius: 8px; border-left: 5px solid var(--primary-color); margin-bottom: 15px; font-size: 20px; }
    .info-box div { margin: 5px 0; }
    
    /* 金額按鈕網格 */
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 15px; }
    .grid-5 button { font-size: 18px; padding: 10px 0; background: #fff; border: 2px solid #f0a3c4; border-radius: 6px; cursor: pointer; color: var(--primary-color); font-weight: bold; }
    .grid-5 button:active { background: #f0a3c4; color: white; }
    
    /* 交易項目網格 */
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
    .grid-3 button { font-size: 20px; padding: 12px 0; background: #f8f9fa; border: 2px solid #ddd; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .grid-3 button.selected { background: var(--primary-color); color: white; border-color: var(--primary-color); }
    
    /* 購物車與歷史紀錄外框（限高、防左右溢出、可垂直捲動） */
    .cart-box, .history-box { background: #f9f9f9; border: 1px dashed #ccc; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 18px; }
    .history-box { max-height: 250px; overflow-y: auto; overflow-x: hidden; border: 1px solid #ddd; background: #ffffff; }
    
    .cart-item, .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; width: 100%; }
    .cart-del-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px; font-weight: bold; padding: 2px 8px; }
    
    /* 歷史紀錄文字排版細節 */
    .hist-left { display: flex; flex-direction: column; text-align: left; max-width: 75%; }
    .hist-time { font-size: 13px; color: #7f8c8d; }
    .hist-item-name { font-size: 17px; color: #2c3e50; margin-top: 2px; }
    .hist-right-amt { font-size: 18px; font-weight: bold; text-align: right; width: 25%; }
    
    /* 交易成功彈出視窗 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; font-size: 20px; }
    .modal-title { text-align: center; font-weight: bold; color: #27ae60; font-size: 24px; margin-bottom: 20px; }
    
    .kv-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .kv-row { display: flex; width: 100%; align-items: center; }
    .kv-label { width: 100px; text-align: left; font-weight: bold; flex-shrink: 0; }
    .kv-colon { width: 20px; text-align: center; flex-shrink: 0; }
    .kv-value { flex-grow: 1; text-align: left; word-break: break-all; }
  </style>
</head>
<body>

<div class="container">
  <h2>小天使代買系統</h2>
  
  <div class="role-selector" id="roleSelector">
    <button class="role-btn active" onclick="switchRole('manager')">代買人登入</button>
    <button class="role-btn" onclick="switchRole('user')">一般成員查詢</button>
  </div>

  <div id="view-login" class="view-section active">
    <div class="form-group">
      <label for="login-id">帳號 (ID)</label>
      <input type="text" id="login-id" placeholder="例如: admin 或 YF001">
    </div>
    <div class="form-group" id="pass-group">
      <label for="login-pass">密碼</label>
      <input type="password" id="login-pass">
    </div>
    <button class="btn" onclick="handleLogin()">進入系統</button>
  </div>

  <div id="view-main" class="view-section">
    <h3 id="panel-title">代買交易面板</h3>
    
    <div id="scanner-section">
      <div style="margin-bottom: 15px;">
        <button class="btn" id="scan-btn" onclick="startScanning()">開始掃描成員 QR</button>
      </div>
      <div id="reader"></div>
    </div>
    
    <hr id="panel-divider" style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    
    <div id="target-user-info" style="display: none;">
      <div class="info-box">
        <div><strong>【ID】</strong> <span id="info-id">-</span></div>
        <div><strong>【姓名】</strong> <span id="info-name">-</span></div>
        <div><strong>【餘額】</strong> <span id="info-balance">0</span> 元</div>
      </div>
      
      <div id="user-history-area" style="display: none;">
        <label>半年內交易紀錄 (最新50筆)</label>
        <div class="history-box" id="history-list">
          （無交易紀錄）
        </div>
      </div>
      
      <div id="manager-action-area">
        <div class="form-group">
          <label>交易金額視窗</label>
          <input type="number" id="tx-amount" placeholder="0" style="text-align: right;">
        </div>
        
        <div class="grid-5">
          <button onclick="addAmount(-1)">-1</button>
          <button onclick="addAmount(-5)">-5</button>
          <button onclick="addAmount(-10)">-10</button>
          <button onclick="addAmount(-50)">-50</button>
          <button onclick="addAmount(-500)">-500</button>
          
          <button onclick="addAmount(1)">+1</button>
          <button onclick="addAmount(5)">+5</button>
          <button onclick="addAmount(10)">+10</button>
          <button onclick="addAmount(50)">+50</button>
          <button onclick="addAmount(500)">+500</button>
        </div>
        
        <label>交易項目 (單選)</label>
        <div class="grid-3" id="item-grid">
          <button class="item-opt selected" onclick="selectItem(this, '飲料')">飲料</button>
          <button class="item-opt" onclick="selectItem(this, '午餐')">午餐</button>
          <button class="item-opt" onclick="selectItem(this, '預留1')">預留1</button>
          <button class="item-opt" onclick="selectItem(this, '預留2')">預留2</button>
          <button class="item-opt" onclick="selectItem(this, '預留3')">預留3</button>
          <button class="item-opt" onclick="selectItem(this, '儲值金')">儲值金</button>
        </div>
        
        <div class="cart-box">
          <div style="font-weight: bold; margin-bottom: 5px;">購物車暫存：</div>
          <div id="cart-list">（無項目）</div>
        </div>
        
        <button class="btn" style="background-color: #27ae60; margin-bottom: 10px;" onclick="addToCart()">加入購物車</button>
        <button class="btn" id="btn-submit-tx" onclick="submitCartTransaction()">確認提交結帳</button>
      </div>
    </div>
    
    <button class="btn btn-secondary" onclick="logout()">登出 / 切換帳號</button>
  </div>
</div>

<div class="modal" id="success-modal">
  <div class="modal-content">
    <div class="modal-title">交易成功</div>
    <div class="kv-container">
      <div class="kv-row"><div class="kv-label">ID</div><div class="kv-colon">:</div><div class="kv-value" id="res-id"></div></div>
      <div class="kv-row"><div class="kv-label">姓名</div><div class="kv-colon">:</div><div class="kv-value" id="res-name"></div></div>
      <div class="kv-row"><div class="kv-label">交易項目</div><div class="kv-colon">:</div><div class="kv-value" id="res-items"></div></div>
      <div class="kv-row"><div class="kv-label">原金額</div><div class="kv-colon">:</div><div class="kv-value" id="res-old"></div></div>
      <div class="kv-row"><div class="kv-label">變動金額</div><div class="kv-colon">:</div><div class="kv-value" id="res-change"></div></div>
      <div class="kv-row"><div class="kv-label">新餘額</div><div class="kv-colon">:</div><div class="kv-value" id="res-new"></div></div>
    </div>
    <button class="btn" onclick="closeModal()">關閉並繼續</button>
  </div>
</div>

<script>
  // 網頁應用程式網址保持不變
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyWhTmqG_g03-4wJlLRT3qrkJt58dYlnO-WIvY6jOFfueRIedRkHQOC_cNg4VI6YuCwww/exec"; 

  let currentRole = 'manager'; 
  let loggedInUser = null;     
  let scannedUser = null;      
  let html5QrcodeScanner = null;
  let selectedItemName = '飲料';
  let shoppingCart = [];
  let canScan = true; // 高敏防禦邏輯鎖

  function playBeep(type) {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime); 
      
      if (type === 'scan') {
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1); 
      } else if (type === 'success') {
        oscillator.type = 'triangle';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
        oscillator.start();
        oscillator.frequency.setValueAtTime(1320, audioCtx.currentTime + 0.15); 
        oscillator.stop(audioCtx.currentTime + 0.35);
      }
    } catch (e) { console.log(e); }
  }

  function switchRole(role) {
    currentRole = role;
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    if (role === 'manager') {
      document.querySelector("button[onclick*='manager']").classList.add('active');
    } else {
      document.querySelector("button[onclick*='user']").classList.add('active');
    }
  }

  function handleLogin() {
    const id = document.getElementById('login-id').value.trim().toUpperCase();
    const pass = document.getElementById('login-pass').value.trim();
    
    if(!id) { alert("請輸入ID"); return; }
    if(!pass) { alert("請輸入密碼"); return; }
    
    const loginBtn = document.querySelector("#view-login .btn");
    loginBtn.disabled = true;
    loginBtn.innerText = "驗證中...";
    
    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "loginAndFetch",
        id: id,
        password: pass,
        isManager: (currentRole === 'manager'),
        byManagerScan: false
      })
    })
    .then(res => res.json())
    .then(data => {
      if(data.success) {
        loggedInUser = data;
        showMainPanel();
      } else {
        alert("錯誤: " + data.message);
      }
    })
    .catch(err => {
      console.error(err);
      alert("網路連線失敗或 GAS 網址設定錯誤");
    })
    .finally(() => {
      loginBtn.disabled = false;
      loginBtn.innerText = "進入系統";
    });
  }

  function showMainPanel() {
    document.getElementById('view-login').classList.remove('active');
    document.getElementById('view-main').classList.add('active');
    document.getElementById('roleSelector').style.display = 'none';
    
    if (currentRole === 'user') {
      document.getElementById('panel-title').innerText = "歡迎！" + loggedInUser.name;
      document.getElementById('scanner-section').style.display = 'none'; 
      document.getElementById('panel-divider').style.display = 'none';
      document.getElementById('manager-action-area').style.display = 'none'; 
      document.getElementById('user-history-area').style.display = 'block'; 
      
      scannedUser = loggedInUser;
      showTargetUserInfo();
    } else {
      document.getElementById('panel-title').innerText = "代買工作台 (" + loggedInUser.id + ")";
      document.getElementById('scanner-section').style.display = 'block';
      document.getElementById('panel-divider').style.display = 'block';
      document.getElementById('manager-action-area').style.display = 'block'; 
      document.getElementById('user-history-area').style.display = 'none'; 
      document.getElementById('target-user-info').style.display = 'none';
      
      startScanning();
    }
  }

  function startScanning() {
    canScan = true; 
    document.getElementById('scanner-section').style.display = 'block';
    document.getElementById('panel-divider').style.display = 'block';
    
    if (html5QrcodeScanner) return; 
    
    html5QrcodeScanner = new Html5Qrcode("reader");
    html5QrcodeScanner.start(
      { facingMode: "environment" }, 
      { fps: 10, qrbox: 250 },
      (qrCodeMessage) => {
        if (!canScan) return; 
        canScan = false; 
        playBeep('scan');
        fetchTargetUser(qrCodeMessage.trim().toUpperCase());
      },
      (errorMessage) => { }
    ).catch(err => {
      console.error(err);
      canScan = true;
    });
  }

  function fetchTargetUser(targetId) {
    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ 
        action: "loginAndFetch", 
        id: targetId, 
        password: "", 
        isManager: false,
        byManagerScan: true 
      })
    })
    .then(res => res.json())
    .then(data => {
      if(data.success) {
        scannedUser = data;
        shoppingCart = []; 
        updateCartUI();
        showTargetUserInfo();
      } else {
        alert("讀取成員失敗: " + data.message);
        startScanning(); 
      }
    })
    .catch(err => {
      console.error(err);
      alert("讀取成員時網路連線發生錯誤");
      startScanning();
    });
  }

  function showTargetUserInfo() {
    if (currentRole === 'manager') {
      document.getElementById('scanner-section').style.display = 'none';
      document.getElementById('panel-divider').style.display = 'none';
    }
    
    document.getElementById('target-user-info').style.display = 'block';
    document.getElementById('info-id').innerText = scannedUser.id;
    document.getElementById('info-name').innerText = scannedUser.name;
    document.getElementById('info-balance').innerText = scannedUser.balance;
    document.getElementById('tx-amount').value = ""; 
    
    if (currentRole === 'user') {
      renderHistoryUI(scannedUser.history);
    }
  }

  function renderHistoryUI(historyArray) {
    const histDiv = document.getElementById('history-list');
    if (!historyArray || historyArray.length === 0) {
      histDiv.innerHTML = "<div style='text-align:center; padding:15px; color:#7f8c8d;'>（半年內無交易紀錄）</div>";
      return;
    }
    
    let html = "";
    historyArray.forEach(log => {
      let color = log.change >= 0 ? "#27ae60" : "#e74c3c";
      let prefix = log.change >= 0 ? "+" : "";
      
      html += `<div class="history-item">
                <div class="hist-left">
                  <span class="hist-time">${log.date}</span>
                  <span class="hist-item-name">(${log.item})</span>
                </div>
                <div class="hist-right-amt" style="color: ${color};">
                  ${prefix}${log.change} 元
                </div>
              </div>`;
    });
    histDiv.innerHTML = html;
  }

  function addAmount(val) {
    let input = document.getElementById('tx-amount');
    let currentVal = input.value === "" ? 0 : Number(input.value);
    input.value = currentVal + val;
  }

  function selectItem(element, name) {
    document.querySelectorAll('.item-opt').forEach(b => b.classList.remove('selected'));
    element.classList.add('selected');
    selectedItemName = name;
  }

  function addToCart() {
    let input = document.getElementById('tx-amount');
    let amt = input.value === "" ? 0 : Number(input.value);
    if(amt === 0) { alert("金額不能為0"); return; }
    
    shoppingCart.push({ name: selectedItemName, amount: amt });
    updateCartUI();
    input.value = ""; 
  }

  function removeFromCart(index) {
    shoppingCart.splice(index, 1);
    updateCartUI();
  }

  function updateCartUI() {
    const listDiv = document.getElementById('cart-list');
    if (shoppingCart.length === 0) {
      listDiv.innerHTML = "（無項目）";
      return;
    }
    let html = "";
    shoppingCart.forEach((item, index) => {
      html += `<div class="cart-item">
                <span>${item.name}：${item.amount > 0 ? '+' : ''}${item.amount} 元</span>
                <button class="cart-del-btn" onclick="removeFromCart(${index})">[刪除]</button>
              </div>`;
    });
    listDiv.innerHTML = html;
  }

  function submitCartTransaction() {
    if(shoppingCart.length === 0) { alert("購物車目前沒有項目，請先加入項目。"); return; }
    
    document.getElementById('btn-submit-tx').disabled = true;
    document.getElementById('btn-submit-tx').innerText = "交易處理中...";

    fetch(GAS_WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "submitTransaction",
        managerId: loggedInUser.id,
        userId: scannedUser.id,
        cartItems: shoppingCart
      })
    })
    .then(res => res.json())
    .then(data => {
      if(data.success) {
        playBeep('success');
        showSuccessModal(data);
      } else {
        alert("交易失敗: " + data.message);
      }
    })
    .finally(() => {
      document.getElementById('btn-submit-tx').disabled = false;
      document.getElementById('btn-submit-tx').innerText = "確認提交結帳";
    });
  }

  function showSuccessModal(data) {
    document.getElementById('res-id').innerText = data.id;
    document.getElementById('res-name').innerText = data.name;
    document.getElementById('res-items').innerText = data.itemsText;
    document.getElementById('res-old').innerText = data.startBalance + " 元";
    document.getElementById('res-change').innerText = (data.totalChange > 0 ? "+" : "") + data.totalChange + " 元";
    document.getElementById('res-new').innerText = data.endBalance + " 元";
    
    document.getElementById('success-modal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('success-modal').classList.remove('active');
    shoppingCart = [];
    updateCartUI();
    
    if (currentRole === 'manager') {
      document.getElementById('target-user-info').style.display = 'none'; 
      scannedUser = null;
      startScanning(); 
    } else {
      document.getElementById('info-balance').innerText = Number(document.getElementById('res-new').innerText.replace(" 元",""));
      document.getElementById('tx-amount').value = ""; 
    }
  }

  function logout() {
    loggedInUser = null;
    scannedUser = null;
    shoppingCart = [];
    canScan = true;
    if(html5QrcodeScanner) { 
      try { html5QrcodeScanner.stop(); } catch(e){} 
      html5QrcodeScanner = null;
    }
    document.getElementById('view-main').classList.remove('active');
    document.getElementById('view-login').classList.add('active');
    document.getElementById('roleSelector').style.display = 'flex';
    document.getElementById('login-id').value = "";
    document.getElementById('login-pass').value = "";
  }
</script>
</body>
</html>
